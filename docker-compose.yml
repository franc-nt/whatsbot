services:
  whatsbot:
    build: .
    container_name: whatsbot
    restart: unless-stopped
    ports:
      - "${WHATSBOT_WEB_PORT:-8080}:8080"
    volumes:
      - ./data/contacts:/app/contacts
      - ./data/storages:/app/storages
      - ./data/statics:/app/statics
      - ./data/logs:/app/logs
      - ./data/config.json:/app/config.json
    environment:
      - WHATSBOT_DOCKER=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - WHATSBOT_MODEL=${WHATSBOT_MODEL:-}
      - WHATSBOT_SYSTEM_PROMPT=${WHATSBOT_SYSTEM_PROMPT:-}
      - WHATSBOT_WEB_PORT=${WHATSBOT_WEB_PORT:-8080}
      - WHATSBOT_GOWA_PORT=${WHATSBOT_GOWA_PORT:-3000}
